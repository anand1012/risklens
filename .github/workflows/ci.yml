name: Deploy

# Runs on push to main only.
# Requires GitHub secret GCP_SA_KEY to be set (see infra/setup_gke.sh).
# Until GCP is configured, this workflow will be skipped gracefully.

on:
  push:
    branches: [main]

env:
  PROJECT: risklens-frtb-2026
  REGION: us-central1
  ZONE: us-central1-a
  CLUSTER: risklens-cluster
  AR_REPO: risklens
  NAMESPACE: risklens

jobs:
  # Guard job — skip entire pipeline if GCP_SA_KEY is not configured yet
  check-gcp:
    name: Check GCP credentials
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        name: Check for GCP_SA_KEY secret
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "GCP_SA_KEY not set — skipping deploy. Run infra/setup_gke.sh first."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

  # ── Build & Push API image ───────────────────────────────────────────────────
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    needs: check-gcp
    if: needs.check-gcp.outputs.ready == 'true'
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - id: meta
        name: Set image tag
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT }}/${{ env.AR_REPO }}/api:${{ github.sha }}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        run: |
          docker build \
            -f api/Dockerfile \
            -t ${{ steps.meta.outputs.image }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT }}/${{ env.AR_REPO }}/api:latest \
            .
          docker push ${{ steps.meta.outputs.image }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT }}/${{ env.AR_REPO }}/api:latest

  # ── Build & Push Frontend image ─────────────────────────────────────────────
  build-frontend:
    name: Build Frontend image
    runs-on: ubuntu-latest
    needs: check-gcp
    if: needs.check-gcp.outputs.ready == 'true'
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - id: meta
        name: Set image tag
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT }}/${{ env.AR_REPO }}/frontend:${{ github.sha }}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build and push Frontend image
        run: |
          docker build \
            -f frontend/Dockerfile \
            -t ${{ steps.meta.outputs.image }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT }}/${{ env.AR_REPO }}/frontend:latest \
            frontend/
          docker push ${{ steps.meta.outputs.image }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT }}/${{ env.AR_REPO }}/frontend:latest

  # ── Sync Spark jobs to GCS ───────────────────────────────────────────────────
  sync-spark-jobs:
    name: Sync Spark jobs to GCS
    runs-on: ubuntu-latest
    needs: check-gcp
    if: needs.check-gcp.outputs.ready == 'true'
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Upload Spark jobs and init script to GCS
        run: |
          BUCKET="risklens-raw-${{ env.PROJECT }}"
          gcloud storage cp ingestion/jobs/*.py          gs://${BUCKET}/jobs/
          gcloud storage cp ingestion/synthetic/generate.py gs://${BUCKET}/jobs/
          gcloud storage cp scripts/dataproc_init.sh    gs://${BUCKET}/scripts/
          echo "Spark jobs synced to gs://${BUCKET}/jobs/"

  # ── Deploy to GKE ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: [build-api, build-frontend, sync-spark-jobs]
    if: needs.build-api.result == 'success' && needs.build-frontend.result == 'success' && needs.sync-spark-jobs.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.ZONE }}
          project_id: ${{ env.PROJECT }}

      - name: Ensure namespace exists
        run: kubectl apply -f infra/k8s/namespace.yaml

      - name: Sync secrets from Secret Manager
        run: |
          ANTHROPIC=$(gcloud secrets versions access latest \
            --secret=risklens-anthropic-api-key --project=${{ env.PROJECT }})
          LANGSMITH=$(gcloud secrets versions access latest \
            --secret=risklens-langsmith-api-key --project=${{ env.PROJECT }})

          kubectl create secret generic risklens-secrets \
            --namespace=${{ env.NAMESPACE }} \
            --from-literal=ANTHROPIC_API_KEY="$ANTHROPIC" \
            --from-literal=LANGCHAIN_API_KEY="$LANGSMITH" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply k8s manifests
        run: |
          kubectl apply -f infra/k8s/ --namespace=${{ env.NAMESPACE }}
          # Remove HPA if it still exists from a previous deploy
          kubectl delete hpa --all --namespace=${{ env.NAMESPACE }} --ignore-not-found=true

      - name: Update API image
        run: |
          kubectl set image deployment/risklens-api \
            api=${{ needs.build-api.outputs.image }} \
            --namespace=${{ env.NAMESPACE }}

      - name: Update Frontend image
        run: |
          kubectl set image deployment/risklens-frontend \
            frontend=${{ needs.build-frontend.outputs.image }} \
            --namespace=${{ env.NAMESPACE }}

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/risklens-api \
            --namespace=${{ env.NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/risklens-frontend \
            --namespace=${{ env.NAMESPACE }} --timeout=180s

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | jq '.success'

      - name: Deployment summary
        run: |
          echo "=== Deployment complete ==="
          kubectl get pods -n ${{ env.NAMESPACE }}
          kubectl get ingress -n ${{ env.NAMESPACE }}
