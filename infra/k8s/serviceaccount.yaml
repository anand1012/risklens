# Kubernetes Service Account bound to a GCP Service Account via Workload Identity.
# The GCP SA (risklens-api-sa@PROJECT.iam.gserviceaccount.com) must have:
#   - roles/bigquery.dataEditor
#   - roles/bigquery.jobUser
#   - roles/storage.objectAdmin
#   - roles/secretmanager.secretAccessor
# These bindings are created by infra/setup_gke.sh
apiVersion: v1
kind: ServiceAccount
metadata:
  name: risklens-api-ksa
  namespace: risklens
  annotations:
    # Links this KSA to the GCP SA for Workload Identity
    iam.gke.io/gcp-service-account: risklens-api-sa@risklens-frtb-2026.iam.gserviceaccount.com
