apiVersion: apps/v1
kind: Deployment
metadata:
  name: risklens-api
  namespace: risklens
  labels:
    app: risklens-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: risklens-api
  template:
    metadata:
      labels:
        app: risklens-api
    spec:
      # Workload Identity: this KSA is bound to a GCP SA with BQ + GCS + Secret Manager roles
      serviceAccountName: risklens-api-ksa

      containers:
        - name: api
          # Image is substituted by CI: REGION-docker.pkg.dev/PROJECT/risklens/api:SHA
          image: REGION-docker.pkg.dev/risklens-frtb-2026/risklens/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: risklens-config

          env:
            # Secrets pulled from GCP Secret Manager via the CI-created k8s Secret
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: risklens-secrets
                  key: ANTHROPIC_API_KEY
            - name: LANGCHAIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: risklens-secrets
                  key: LANGCHAIN_API_KEY

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 20
            failureThreshold: 3

      terminationGracePeriodSeconds: 30
