apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: risklens-ingress
  namespace: risklens
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: risklens-ip
    networking.gke.io/managed-certificates: risklens-cert
spec:
  rules:
    - host: risklens.preciseguess.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: risklens-api
                port:
                  number: 8000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: risklens-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: risklens-frontend
                port:
                  number: 80
---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: risklens-cert
  namespace: risklens
spec:
  domains:
    - risklens.preciseguess.com
