apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: risklens-api-hpa
  namespace: risklens
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: risklens-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120   # wait 2 min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
